<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>核桃OJ快速导入</title>
  <script src="xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --border: rgba(17, 24, 39, 0.09);
      --text: #16181d;
      --muted: #6b7280;
      --faint: #9ca3af;
      --accent: #6366f1;
      --accent2: #9333ea;
      --ok: #16a34a;
      --err: #dc2626;
      --shadow: 0 2px 14px rgba(17, 24, 39, 0.06);
      --mono: 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased; min-height: 100vh;
    }

    .topbar {
      display: flex; align-items: center; gap: 16px; padding: 16px 28px;
      border-bottom: 1px solid var(--border); background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 20;
    }
    .back { flex-shrink: 0; font-size: 13px; color: var(--muted); text-decoration: none; padding: 7px 14px; border-radius: 999px; border: 1px solid var(--border); transition: all 0.2s ease; }
    .back:hover { color: var(--text); border-color: var(--accent); }
    .title-wrap h1 { font-size: 21px; font-weight: 800; letter-spacing: 1px; background: linear-gradient(120deg, #4f46e5, #9333ea 55%, #db2777); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .title-wrap p { margin-top: 2px; font-size: 12.5px; color: var(--muted); }
    .spacer { flex: 1; }

    .app { display: flex; gap: 20px; align-items: stretch; max-width: 1440px; margin: 0 auto; padding: 22px 24px 40px; }

    /* 左侧输入面板（保留 .left-panel，供拖拽改宽脚本使用） */
    .left-panel {
      width: 400px; min-width: 280px; max-width: 600px; flex-shrink: 0;
      display: flex; flex-direction: column;
    }
    .panel-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow);
      display: flex; flex-direction: column; overflow: hidden; flex: 1;
    }

    .panel-toolbar {
      padding: 13px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .panel-toolbar .label { font-size: 14.5px; font-weight: 600; color: var(--text); }
    .id-count { margin-left: auto; font-size: 12px; font-weight: 500; color: var(--faint); font-variant-numeric: tabular-nums; }

    .panel-content {
      flex: 1; padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto;
    }
    .form-group { display: flex; flex-direction: column; gap: 7px; }
    .form-group > label { font-size: 12.5px; color: var(--muted); font-weight: 500; }

    textarea {
      width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 13px 14px; resize: vertical;
      font-family: var(--mono); font-size: 13px; line-height: 1.65; color: #1e293b; background: #fff; outline: none;
      min-height: 240px;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--faint); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; }

    .action-bar {
      padding: 14px 16px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; align-items: center;
    }
    .action-bar .btn { flex: 1; justify-content: center; }

    .btn {
      font-family: inherit; font-size: 13px; font-weight: 500; padding: 9px 14px; border-radius: 9px;
      border: 1px solid var(--border); background: #fff; color: var(--text); cursor: pointer;
      transition: all 0.18s ease; display: inline-flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { border: none; color: #fff; background: linear-gradient(120deg, var(--accent), var(--accent2)); }
    .btn.primary:hover { color: #fff; filter: brightness(1.06); }
    .btn.danger { color: var(--err); }
    .btn.danger:hover { border-color: var(--err); color: var(--err); }

    /* 拖拽改宽手柄 */
    .panel-resizer {
      width: 8px; align-self: stretch; cursor: col-resize; flex-shrink: 0; position: relative;
      border-radius: 999px; transition: background 0.15s ease;
    }
    .panel-resizer::after {
      content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 3px; height: 34px; background: #d4d8e2; border-radius: 999px; transition: background 0.15s ease;
    }
    .panel-resizer:hover::after, .panel-resizer.active::after { background: var(--accent); }

    /* 右侧预览面板 */
    .right-panel { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .preview-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px; box-shadow: var(--shadow);
      overflow: hidden; flex: 1; display: flex; flex-direction: column;
    }
    .preview-card-header {
      padding: 13px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .preview-card-header .title { font-size: 14.5px; font-weight: 600; color: var(--text); }
    .preview-card-header .count { margin-left: auto; font-size: 12px; font-weight: 500; color: var(--faint); font-variant-numeric: tabular-nums; }

    .table-wrapper { flex: 1; overflow-y: auto; }

    table { width: 100%; border-collapse: collapse; }
    table thead { position: sticky; top: 0; z-index: 1; }
    table th {
      background: #f7f8fb; color: var(--muted); padding: 11px 18px; text-align: left;
      font-size: 12.5px; font-weight: 600; border-bottom: 1px solid var(--border);
    }
    table th .col-index,
    table td .row-index {
      display: inline-block; min-width: 24px; height: 22px; line-height: 22px; text-align: center;
      border-radius: 6px; font-size: 11px; margin-right: 10px; font-variant-numeric: tabular-nums;
    }
    table th .col-index { background: rgba(99, 102, 241, 0.12); color: var(--accent); }
    table td .row-index { background: #f1f5f9; color: var(--faint); }
    table td {
      padding: 9px 18px; font-size: 13px; color: var(--text);
      border-bottom: 1px solid var(--border); font-family: var(--mono);
    }
    table tbody tr { transition: background 0.1s ease; }
    table tbody tr:nth-child(even) { background: #fafbfc; }
    table tbody tr:hover { background: rgba(99, 102, 241, 0.05); }

    .empty-preview { padding: 64px 24px; text-align: center; color: var(--faint); }
    .empty-preview .icon {
      width: 56px; height: 56px; margin: 0 auto 14px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(99, 102, 241, 0.08); color: var(--accent);
    }
    .empty-preview .icon svg { width: 28px; height: 28px; }
    .empty-preview .text { font-size: 13.5px; line-height: 1.6; }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d4d8e2; border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: #b6bccb; }

    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: rgba(22, 24, 29, 0.92); color: #fff; padding: 10px 20px; border-radius: 999px;
      font-size: 13px; opacity: 0; pointer-events: none; transition: all 0.3s ease; z-index: 50;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 960px) {
      .app { flex-direction: column; align-items: stretch; }
      .left-panel { width: 100% !important; max-width: none; }
      .panel-resizer { display: none; }
      textarea { min-height: 180px; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <a class="back" href="../">← 猫凳系统</a>
  <div class="title-wrap">
    <h1>核桃OJ快速导入</h1>
    <p>OJ 小组名单批量导入</p>
  </div>
  <span class="spacer"></span>
</header>

<div class="app">
  <!-- Left Panel: Input -->
  <div class="left-panel">
    <div class="panel-card">
      <div class="panel-toolbar">
        <span class="label">用户ID输入</span>
        <span class="id-count" id="idCount">共 0 个ID</span>
      </div>
      <div class="panel-content">
        <div class="form-group">
          <label>每行输入一个用户ID</label>
          <textarea id="idInput" placeholder="请输入用户ID，每行一个&#10;例如：&#10;10001&#10;10002&#10;10003" oninput="updatePreview()"></textarea>
        </div>
      </div>
      <div class="action-bar">
        <button class="btn danger" onclick="clearInput()">清空</button>
        <button class="btn primary" onclick="generateExcel()">生成表格</button>
      </div>
    </div>
  </div>

  <!-- Resizer -->
  <div class="panel-resizer" id="panelResizer"></div>

  <!-- Right Panel: Preview -->
  <div class="right-panel">
    <div class="preview-card">
      <div class="preview-card-header">
        <span class="title">表格预览</span>
        <span class="count" id="previewCount">0 条记录</span>
      </div>
      <div class="table-wrapper" id="tableWrapper">
        <div class="empty-preview" id="emptyPreview">
          <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6a1 1 0 0 1 1 1v1h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2V4a1 1 0 0 1 1-1z"/><path d="M9 5h6"/><path d="M8 11h8M8 15h5"/></svg></div>
          <div class="text">在左侧输入用户ID后，这里将实时显示预览</div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
var EMPTY_ICON_SVG = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6a1 1 0 0 1 1 1v1h2a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2V4a1 1 0 0 1 1-1z"/><path d="M9 5h6"/><path d="M8 11h8M8 15h5"/></svg>';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function parseIds() {
  const text = document.getElementById('idInput').value.trim();
  if (!text) return [];
  return text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
}

function updatePreview() {
  const ids = parseIds();
  document.getElementById('idCount').textContent = '共 ' + ids.length + ' 个ID';
  document.getElementById('previewCount').textContent = ids.length + ' 条记录';

  const wrapper = document.getElementById('tableWrapper');
  const empty = document.getElementById('emptyPreview');

  if (ids.length === 0) {
    wrapper.innerHTML = '';
    const emptyDiv = document.createElement('div');
    emptyDiv.className = 'empty-preview';
    emptyDiv.id = 'emptyPreview';
    emptyDiv.innerHTML = '<div class="icon">' + EMPTY_ICON_SVG + '</div><div class="text">在左侧输入用户ID后，这里将实时显示预览</div>';
    wrapper.appendChild(emptyDiv);
    return;
  }

  let html = '<table><thead><tr><th><span class="col-index">#</span>用户id</th></tr></thead><tbody>';
  ids.forEach((id, idx) => {
    html += '<tr><td><span class="row-index">' + (idx + 1) + '</span>' + escHtml(id) + '</td></tr>';
  });
  html += '</tbody></table>';
  wrapper.innerHTML = html;
}

function escHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function clearInput() {
  document.getElementById('idInput').value = '';
  updatePreview();
  showToast('已清空');
}

function generateExcel() {
  const ids = parseIds();
  if (ids.length === 0) {
    showToast('请先输入至少一个用户ID');
    return;
  }

  const data = [['用户id']];
  ids.forEach(id => data.push([id]));

  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{ wch: 20 }];
  XLSX.utils.book_append_sheet(wb, ws, '用户ID');

  const filename = '核桃OJ用户ID_' + new Date().toISOString().slice(0, 10) + '.xlsx';
  XLSX.writeFile(wb, filename);
  showToast('已生成并下载 ' + filename);
}

// Panel resizer
document.addEventListener('DOMContentLoaded', () => {
  const resizer = document.getElementById('panelResizer');
  const leftPanel = document.querySelector('.left-panel');
  let resizeState = null;

  resizer.addEventListener('mousedown', (e) => {
    resizeState = { startX: e.clientX, startW: leftPanel.offsetWidth };
    resizer.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!resizeState) return;
    const dx = e.clientX - resizeState.startX;
    const newW = Math.max(280, Math.min(600, resizeState.startW + dx));
    leftPanel.style.width = newW + 'px';
    e.preventDefault();
  }, true);

  document.addEventListener('mouseup', () => {
    if (resizeState) {
      resizeState = null;
      resizer.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  }, true);
});
</script>

</body>
</html>
