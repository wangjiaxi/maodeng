<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>核桃客观题Markdown查看器</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --border: rgba(17, 24, 39, 0.09);
      --text: #16181d;
      --muted: #6b7280;
      --faint: #9ca3af;
      --accent: #6366f1;
      --accent2: #9333ea;
      --shadow: 0 2px 14px rgba(17, 24, 39, 0.06);
      --radius: 14px;
      --mono: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column;
    }

    /* ===== 顶部工具栏 ===== */
    .topbar {
      display: flex; align-items: center; gap: 16px; padding: 16px 28px;
      border-bottom: 1px solid var(--border); background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 20; flex-shrink: 0;
    }
    .back {
      flex-shrink: 0; font-size: 13px; color: var(--muted); text-decoration: none;
      padding: 7px 14px; border-radius: 999px; border: 1px solid var(--border); transition: all 0.2s ease;
    }
    .back:hover { color: var(--text); border-color: var(--accent); }
    .title-wrap h1 {
      font-size: 21px; font-weight: 800; letter-spacing: 1px;
      background: linear-gradient(120deg, #4f46e5, #9333ea 55%, #db2777);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .title-wrap p { margin-top: 2px; font-size: 12.5px; color: var(--muted); }
    .spacer { flex: 1; }

    /* 主题切换（保留原功能） */
    .theme-switch {
      flex-shrink: 0; display: flex; align-items: center; gap: 8px;
      cursor: pointer; user-select: none; font-size: 12.5px; color: var(--muted);
      padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border);
      transition: all 0.2s ease;
    }
    .theme-switch:hover { color: var(--text); border-color: var(--accent); }
    .theme-toggle {
      width: 38px; height: 20px; border-radius: 10px; position: relative;
      transition: background 0.25s; flex-shrink: 0;
    }
    .theme-light .theme-toggle { background: #d3d7e0; }
    .theme-dark  .theme-toggle { background: var(--accent); }
    .theme-toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 16px; height: 16px; border-radius: 50%; background: #fff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, .15); transition: transform 0.25s;
    }
    .theme-dark .theme-toggle::after { transform: translateX(18px); }

    /* ===== 布局 ===== */
    .app-layout {
      flex: 1; display: flex; align-items: stretch; gap: 20px;
      max-width: 1440px; width: 100%; margin: 0 auto; padding: 22px 24px 28px;
      min-height: 0; overflow: hidden;
    }

    /* 卡片基底 */
    .card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .card-head {
      padding: 13px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
      font-size: 14.5px; font-weight: 600; flex-shrink: 0;
    }
    .card-head .sub { margin-left: 8px; font-size: 12px; font-weight: 500; color: var(--faint); }

    /* 左：编辑卡片 */
    .left-panel {
      width: 46%; min-width: 280px; max-width: 820px;
      flex-shrink: 0; min-height: 0;
    }
    .editor-area {
      flex: 1; width: 100%; padding: 14px 16px; border: none; outline: none; resize: none;
      font-family: var(--mono); font-size: 13px; line-height: 1.75; color: #1e293b;
      tab-size: 4; white-space: pre-wrap; word-wrap: break-word; overflow-y: auto;
      background: #fff;
    }

    /* 拖拽分隔条 */
    .panel-resizer {
      width: 8px; cursor: col-resize; background: transparent;
      position: relative; flex-shrink: 0; z-index: 10;
      align-self: stretch; transition: background 0.15s;
    }
    .panel-resizer::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 3px; height: 34px; background: #cbd0db; border-radius: 2px; transition: background 0.15s;
    }
    .panel-resizer:hover::after,
    .panel-resizer.active::after { background: var(--accent); }

    /* 右：预览卡片 */
    .right-panel { flex: 1; min-width: 0; min-height: 0; }
    .preview-scroll { flex: 1; overflow-y: auto; padding: 22px 26px; }
    .preview-content { max-width: 760px; margin: 0 auto; }
    .preview-empty { color: var(--faint); text-align: center; padding: 48px 0; font-size: 13.5px; }

    /* ===== 题目块 ===== */
    .question-block {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 12px; padding: 18px 22px; margin-bottom: 18px;
      box-shadow: var(--shadow);
    }

    .question-text {
      font-size: 15px; line-height: 1.85; color: var(--text);
      margin-bottom: 14px; word-break: break-word;
    }
    .question-text > *:last-child { margin-bottom: 0; }

    .options-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    .option-item {
      display: flex; align-items: center; gap: 10px; padding: 10px 14px;
      border: 1px solid var(--border); border-radius: 10px; cursor: pointer;
      transition: all 0.15s; user-select: none; font-size: 14px; line-height: 1.5;
    }
    .option-item:hover { border-color: var(--accent); background: rgba(99, 102, 241, 0.05); }
    .option-item.selected { border-color: var(--accent); background: rgba(99, 102, 241, 0.09); }

    .option-radio {
      width: 18px; height: 18px; border: 2px solid #b6bccb; border-radius: 50%;
      flex-shrink: 0; transition: all 0.15s; position: relative;
    }
    .option-item.selected .option-radio { border-color: var(--accent); }
    .option-item.selected .option-radio::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); width: 8px; height: 8px;
      border-radius: 50%; background: var(--accent);
    }

    .option-label { font-weight: 700; color: var(--accent); flex-shrink: 0; min-width: 22px; }
    .option-text { flex: 1; word-break: break-word; }

    /* ===== Markdown 排版 ===== */
    .question-text h1, .question-text h2, .question-text h3,
    .question-text h4, .question-text h5, .question-text h6 {
      line-height: 1.4; margin: 14px 0 8px; font-weight: 700; color: var(--text);
    }
    .question-text h1 { font-size: 1.4em; }
    .question-text h2 { font-size: 1.25em; }
    .question-text h3 { font-size: 1.1em; }
    .question-text p { margin: 8px 0; }
    .question-text ul, .question-text ol { margin: 8px 0; padding-left: 1.4em; }
    .question-text li { margin: 4px 0; }
    .question-text strong { font-weight: 700; }
    .question-text a { color: var(--accent); text-decoration: none; }
    .question-text a:hover { text-decoration: underline; }
    .question-text blockquote {
      margin: 10px 0; padding: 6px 14px; border-left: 3px solid var(--border);
      color: var(--muted);
    }

    /* 代码块 */
    .code-block {
      padding: 14px 18px; border-radius: 10px; margin: 12px 0; overflow-x: auto;
      font-family: var(--mono); font-size: 13px; line-height: 1.6;
      transition: background-color 0.25s, color 0.25s, border-color 0.25s;
    }

    /* 浅色主题（默认） */
    .theme-light .code-block { background: #f6f8fa; color: #24292f; border: 1px solid #e2e6ec; }
    .theme-light .code-block code { color: #24292f; }
    .theme-light .question-text code,
    .theme-light .option-text code {
      font-family: var(--mono); background: #f1f5f9; padding: 2px 6px;
      border-radius: 5px; font-size: 13px; color: #b5197d;
    }
    .theme-light .option-text code { padding: 1px 5px; }

    /* 深色主题 */
    .theme-dark { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --faint: #64748b; }
    .theme-dark .topbar { background: rgba(15, 23, 42, 0.72); }
    .theme-dark .back { border-color: #334155; }
    .theme-dark .editor-area { background: #1e293b; color: #e2e8f0; }
    .theme-dark .panel-resizer::after { background: #475569; }
    .theme-dark .question-block { border-left-color: #6366f1; box-shadow: 0 4px 12px rgba(0, 0, 0, .25); }
    .theme-dark .option-item { border-color: #334155; color: #cbd5e1; }
    .theme-dark .option-item:hover { border-color: #6366f1; background: #28354d; }
    .theme-dark .option-item.selected { border-color: #6366f1; background: #312e81; }
    .theme-dark .option-label { color: #818cf8; }
    .theme-dark .option-text { color: #e2e8f0; }
    .theme-dark .code-block { background: #0f172a; color: #e2e8f0; border: 1px solid #334155; }
    .theme-dark .code-block code { color: #e2e8f0; }
    .theme-dark .question-text code,
    .theme-dark .option-text code {
      font-family: var(--mono); background: #334155; padding: 2px 6px;
      border-radius: 5px; font-size: 13px; color: #f472b6;
    }
    .theme-dark .option-text code { padding: 1px 5px; }

    /* 滚动条 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd0db; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #aab1c0; }
    .theme-dark ::-webkit-scrollbar-thumb { background: #475569; }
    .theme-dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

    /* 响应式：窄屏堆叠 */
    @media (max-width: 860px) {
      .topbar { padding: 14px 18px; gap: 12px; }
      .app-layout { flex-direction: column; overflow: visible; padding: 16px 16px 24px; gap: 16px; }
      .left-panel { width: 100%; max-width: none; height: 320px; }
      .right-panel { width: 100%; }
      .panel-resizer { display: none; }
      .preview-scroll { padding: 18px 16px; }
    }
  </style>
</head>
<body class="theme-light">

<header class="topbar">
  <a class="back" href="https://maodeng.xkloj.online">← 猫凳系统</a>
  <div class="title-wrap">
    <h1>核桃客观题Markdown查看器</h1>
    <p>客观题 Markdown 预览</p>
  </div>
  <span class="spacer"></span>
  <div class="theme-switch" onclick="toggleTheme()">
    <span>亮</span>
    <div class="theme-toggle"></div>
    <span>暗</span>
  </div>
</header>

<div class="app-layout">
  <!-- 左：编辑区 -->
  <div class="left-panel card">
    <div class="card-head">Markdown 编辑<span class="sub">输入题目内容，实时预览</span></div>
    <textarea class="editor-area" id="editor" spellcheck="false" placeholder="在此输入 Markdown 内容..."></textarea>
  </div>

  <!-- 拖拽分隔条 -->
  <div class="panel-resizer" id="resizer"></div>

  <!-- 右：预览区 -->
  <div class="right-panel card">
    <div class="card-head">预览<span class="sub">支持单选题渲染</span></div>
    <div class="preview-scroll">
      <div class="preview-content" id="preview">
        <p class="preview-empty">在左侧输入 Markdown 内容后，这里将显示预览</p>
      </div>
    </div>
  </div>
</div>

<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

// 默认示例内容
editor.value = `1. 已知变量 \`x = 'bookshelf'\`，想要打印出字符 \`'s'\`，横线处应填写的代码是哪个选项？
{{ select(1) }}
- A. \`x[4]\`
- B. \`x[5]\`
- C. \`x['s']\`
- D. \`x.get('s')\`

---

2. 若 \`a = 10\`, \`b = 20\`，则 \`a + b\`的值是？
{{ select(2) }}
- A. 30
- B. 1020
- C. \`Error\`
- D. \`None\`

---

3. 判断列表 lst 是否为空，应使用？
{{ select(3) }}
- A. \`if lst == []\`
- B. \`if not lst\`
- C. \`if len(lst) = 0\`
- D. 以上都是

---

4. 执行 \`print('hello')\`后输出？
\`\`\`Python
x = 1
if x > 0:
    print("Positive")
\`\`\`
{{ select(4) }}
- A. \`Positive\`
- B. \`hello\`
- C. 1
- D. \`Error\`

---

5. 表达式 10 != 10 的结果是？
{{ select(5) }}
- A. \`True\`
- B. \`False\`
- C. \`None\`
- D. \`Error\``;

function renderPreview() {
  const raw = editor.value.trim();
  if (!raw) {
    preview.innerHTML = '<p class="preview-empty">在左侧输入 Markdown 内容后，这里将显示预览</p>';
    return;
  }

  // 按 --- 分割成多个题目块
  const blocks = raw.split(/\n\s*---+\s*\n/);

  let html = '';
  let qNum = 0;

  blocks.forEach(block => {
    const trimmed = block.trim();
    if (!trimmed) return;

    qNum++;

    // 分离题干和选项
    const lines = trimmed.split('\n');
    let questionLines = [];
    let optionLines = [];

    let inOptions = false;
    for (let i = 0; i < lines.length; i++) {
      const line = lines[i].trim();
      if (/^-\s+[A-Z]\./.test(line)) {
        inOptions = true;
      }
      if (inOptions && !line.startsWith('-')) {
        inOptions = false;
      }
      if (inOptions) {
        optionLines.push(lines[i]);
      } else if (!/^{{\s*select/.test(line)) {
        // 跳过 {{ select(n) }} 行
        questionLines.push(lines[i]);
      }
    }

    // 渲染题干（统一处理代码块和行内代码）
    let qHtml = renderQuestion(questionLines.join('\n'));

    // 渲染选项
    let optsHtml = '';
    optionLines.forEach((optLine, idx) => {
      const m = optLine.match(/^-\s+([A-Z])\.\s*(.*)/);
      if (m) {
        const label = m[1];
        const text = escHtml(m[2]).replace(/`([^`]+)`/g, '<code>$1</code>');
        optsHtml += `<li class="option-item" data-q="${qNum}" onclick="toggleOption(this)">
          <span class="option-radio"></span>
          <span class="option-label">${label}.</span>
          <span class="option-text">${text}</span>
        </li>`;
      }
    });

    html += `<div class="question-block">
      <div class="question-text">${qHtml}</div>
      ${optsHtml ? `<ul class="options-list">${optsHtml}</ul>` : ''}
    </div>`;
  });

  preview.innerHTML = html;
}

// 统一渲染题干：先提取代码块（避免被转义），再处理行内代码
function renderQuestion(text) {
  // 先提取所有代码块，用占位符保护
  const codeBlocks = [];
  let result = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
    var i = codeBlocks.length;
    codeBlocks.push({ lang: lang, code: code });
    return '\x00CB' + i + '\x00';
  });

  // 转义剩余HTML，替换行内代码
  result = escHtml(result).replace(/`([^`]+)`/g, '<code>$1</code>');

  // 恢复代码块
  result = result.replace(/\x00CB(\d+)\x00/g, function(m, idx) {
    var cb = codeBlocks[parseInt(idx)];
    return '<pre class="code-block"><code>' + escHtml(cb.code) + '</code></pre>';
  });

  return result;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 主题切换
function toggleTheme() {
  const body = document.body;
  body.classList.toggle('theme-light');
  body.classList.toggle('theme-dark');
}

// 单选切换（同题互斥）
function toggleOption(el) {
  const q = el.dataset.q;
  const container = el.parentElement;
  const items = container.querySelectorAll('.option-item[data-q="' + q + '"]');
  items.forEach(item => item.classList.remove('selected'));
  el.classList.add('selected');
}

// 实时更新
let timer;
editor.addEventListener('input', () => {
  clearTimeout(timer);
  timer = setTimeout(renderPreview, 150);
});

// 初始渲染
renderPreview();

// 拖拽调整面板宽度
document.addEventListener('DOMContentLoaded', () => {
  const resizer = document.getElementById('resizer');
  const leftPanel = document.querySelector('.left-panel');
  let resizing = null;

  resizer.addEventListener('mousedown', e => {
    resizing = { startX: e.clientX, startW: leftPanel.offsetWidth };
    resizer.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    const dx = e.clientX - resizing.startX;
    const w = Math.max(280, Math.min(800, resizing.startW + dx));
    leftPanel.style.width = w + '%';
  }, true);

  document.addEventListener('mouseup', () => {
    if (resizing) {
      resizing = null;
      resizer.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  }, true);
});
</script>

</body>
</html>
