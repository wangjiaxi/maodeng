<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="../favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>猫凳题目图片生成工具</title>
  <script src="html2canvas.min.js"></script>
  <style>
    /* 方正准圆 + Consolas 组合字体：中文用方正准圆，英文/数字/符号用 Consolas */
    @font-face {
      font-family: 'ZhunYuan-Consolas';
      src: local('Consolas'), local('Consolas Regular');
      unicode-range: U+0000-007F, U+0080-00FF, U+0100-017F, U+0180-024F, U+2190-21FF, U+2200-22FF, U+25A0-25FF;
      font-weight: normal;
    }
    @font-face {
      font-family: 'ZhunYuan-Consolas';
      src: local('Consolas Bold');
      unicode-range: U+0000-007F, U+0080-00FF, U+0100-017F, U+0180-024F, U+2190-21FF, U+2200-22FF, U+25A0-25FF;
      font-weight: bold;
    }
    @font-face {
      font-family: 'ZhunYuan-Consolas';
      src: local('FZY3JW--GB1-0'), local('方正准圆简体');
      unicode-range: U+4E00-9FFF, U+3400-4DBF, U+3000-303F, U+3040-309F, U+30A0-30FF, U+31C0-31EF, U+2000-206F, U+FF00-FFEF, U+FE30-FE4F;
      font-weight: normal;
    }
    @font-face {
      font-family: 'ZhunYuan-Consolas';
      src: local('FZY3JW--GB1-0'), local('方正准圆简体');
      unicode-range: U+4E00-9FFF, U+3400-4DBF, U+3000-303F, U+3040-309F, U+30A0-30FF, U+31C0-31EF, U+2000-206F, U+FF00-FFEF, U+FE30-FE4F;
      font-weight: bold;
    }

    /* 方正粗圆 + Consolas 组合字体 */
    @font-face {
      font-family: 'CuYuan-Consolas';
      src: local('Consolas'), local('Consolas Regular');
      unicode-range: U+0000-007F, U+0080-00FF, U+0100-017F, U+0180-024F, U+2190-21FF, U+2200-22FF, U+25A0-25FF;
      font-weight: normal;
    }
    @font-face {
      font-family: 'CuYuan-Consolas';
      src: local('Consolas Bold');
      unicode-range: U+0000-007F, U+0080-00FF, U+0100-017F, U+0180-024F, U+2190-21FF, U+2200-22FF, U+25A0-25FF;
      font-weight: bold;
    }
    @font-face {
      font-family: 'CuYuan-Consolas';
      src: local('FZY4JW--GB1-0'), local('方正粗圆简体');
      unicode-range: U+4E00-9FFF, U+3400-4DBF, U+3000-303F, U+3040-309F, U+30A0-30FF, U+31C0-31EF, U+2000-206F, U+FF00-FFEF, U+FE30-FE4F;
      font-weight: normal;
    }
    @font-face {
      font-family: 'CuYuan-Consolas';
      src: local('FZY4JW--GB1-0'), local('方正粗圆简体');
      unicode-range: U+4E00-9FFF, U+3400-4DBF, U+3000-303F, U+3040-309F, U+30A0-30FF, U+31C0-31EF, U+2000-206F, U+FF00-FFEF, U+FE30-FE4F;
      font-weight: bold;
    }

    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --card-bg: #ffffff;
      --border: rgba(17, 24, 39, 0.09);
      --text: #16181d;
      --muted: #6b7280;
      --text-secondary: #6b7280;
      --faint: #9ca3af;
      --accent: #6366f1;
      --accent2: #9333ea;
      --primary: #6366f1;
      --danger: #dc2626;
      --success: #16a34a;
      --shadow: 0 2px 14px rgba(17, 24, 39, 0.06);
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== Topbar ===== */
    .topbar {
      display: flex; align-items: center; gap: 16px; padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      position: sticky; top: 0; z-index: 100;
    }
    .back {
      flex-shrink: 0; font-size: 13px; color: var(--muted); text-decoration: none;
      padding: 7px 14px; border-radius: 999px; border: 1px solid var(--border); transition: all 0.2s ease;
    }
    .back:hover { color: var(--text); border-color: var(--accent); }
    .title-wrap h1 {
      font-size: 21px; font-weight: 800; letter-spacing: 1px;
      background: linear-gradient(120deg, #4f46e5, #9333ea 55%, #db2777);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
    }
    .title-wrap p { margin-top: 2px; font-size: 12.5px; color: var(--muted); }
    .header-hint { font-size: 12.5px; color: var(--muted); }

    /* ===== Layout ===== */
    .app-layout {
      display: flex;
      gap: 18px;
      align-items: stretch;
      max-width: 1480px;
      margin: 0 auto;
      padding: 20px 24px 36px;
      min-height: calc(100vh - 59px);
    }

    /* Left Panel (controls) */
    .left-panel {
      width: 360px;
      min-width: 240px;
      max-width: 600px;
      flex-shrink: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      align-self: flex-start;
      position: sticky;
      top: 79px;
      max-height: calc(100vh - 99px);
    }

    /* Resizer handle */
    .panel-resizer {
      width: 10px;
      cursor: col-resize;
      background: transparent;
      position: relative;
      flex-shrink: 0;
      z-index: 10;
      align-self: stretch;
    }
    .panel-resizer::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 3px;
      height: 36px;
      background: #d3d7e0;
      border-radius: 3px;
      transition: background 0.15s;
    }
    .panel-resizer:hover::after,
    .panel-resizer.active::after {
      background: var(--accent);
    }

    .panel-toolbar {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 9px;
      background: #fbfbfd;
    }

    /* ===== Buttons ===== */
    .btn {
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 9px;
      background: #fff;
      color: var(--text);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }

    .btn-primary {
      border: none;
      color: #fff;
      background: linear-gradient(120deg, var(--accent), var(--accent2));
    }
    .btn-primary:hover { color: #fff; filter: brightness(1.06); border: none; }

    .btn-sm {
      padding: 6px 11px;
      font-size: 12.5px;
    }

    .btn-danger { color: var(--danger); border-color: var(--border); background: #fff; }
    .btn-danger:hover { background: #fef2f2; color: var(--danger); border-color: var(--danger); }

    .element-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .element-item {
      border: 1px solid var(--border);
      border-radius: 11px;
      margin-bottom: 10px;
      background: #fff;
      transition: box-shadow 0.18s, border-color 0.18s;
    }
    .element-item:hover { box-shadow: var(--shadow); border-color: rgba(99,102,241,0.3); }

    .element-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 13px;
      cursor: pointer;
      user-select: none;
      border-bottom: 1px solid transparent;
    }
    .element-item-header.expanded {
      border-bottom-color: var(--border);
    }
    .element-item-header .label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
    }
    .element-item-header .label .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
    }
    .tag-text { background: linear-gradient(120deg, var(--accent), var(--accent2)); }
    .tag-image { background: linear-gradient(120deg, #16a34a, #0d9488); }

    .element-item-header .arrow {
      transition: transform 0.2s;
      color: var(--faint);
      font-size: 11px;
    }
    .element-item-header.expanded .arrow { transform: rotate(180deg); }

    .element-item-body {
      padding: 0 13px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease, padding 0.25s ease;
    }
    .element-item-body.expanded {
      max-height: 640px;
      padding: 13px;
    }

    .form-row {
      display: flex;
      gap: 9px;
      margin-bottom: 11px;
      align-items: center;
    }
    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }
    .form-group label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }
    .form-group input[type="number"],
    .form-group input[type="text"],
    .form-group textarea {
      font-family: inherit;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 64px;
      line-height: 1.6;
      font-family: 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    .color-input-wrap {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .color-input-wrap input[type="color"] {
      -webkit-appearance: none; appearance: none;
      width: 32px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 0;
      cursor: pointer;
      background: none;
      flex-shrink: 0;
    }
    .color-input-wrap input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
    .color-input-wrap input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }
    .color-input-wrap input[type="text"] {
      flex: 1;
      min-width: 0;
    }

    .img-preview-thumb {
      margin-top: 8px;
      max-width: 100%;
      max-height: 90px;
      border: 1px solid var(--border);
      border-radius: 8px;
      object-fit: contain;
    }

    /* select in left panel */
    .form-group select {
      font-family: inherit;
      font-size: 13px;
      color: var(--text);
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      outline: none;
      cursor: pointer;
      width: 100%;
    }
    .form-group select:focus { border-color: var(--accent); }

    /* ===== Right Panel (preview) ===== */
    .right-panel {
      flex: 1;
      min-width: 0;
      overflow: auto;
      padding: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }

    .save-bar {
      width: 100%;
      margin-bottom: 18px;
      display: flex;
      gap: 11px;
      align-items: center;
      flex-wrap: wrap;
      padding: 11px 13px;
      background: #fbfbfd;
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .canvas-width-control {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--muted);
    }
    .canvas-width-control input {
      font-family: inherit;
      width: 78px;
      padding: 6px 9px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--text);
      text-align: center;
      outline: none;
      background: #fff;
    }
    .canvas-width-control input:focus { border-color: var(--accent); }

    .preview-wrapper {
      padding: 0;
      display: inline-block;
      max-width: 100%;
    }

    /* Stash (clipboard) area */
    .stash-section {
      width: 100%;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .stash-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .stash-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 11px;
      max-height: 360px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .stash-item {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 9px;
      overflow: hidden;
      background: #fff;
      transition: box-shadow 0.18s, border-color 0.18s;
    }
    .stash-item:hover {
      box-shadow: var(--shadow);
      border-color: rgba(99,102,241,0.3);
    }
    .stash-item img {
      width: 100%;
      max-height: 160px;
      object-fit: contain;
      display: block;
      cursor: pointer;
      background: #f7f8fb;
    }
    .stash-item-num {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      border-right: 1px solid var(--border);
    }
    .stash-item-actions {
      display: flex;
      gap: 0;
      background: #fff;
      border-top: 1px solid var(--border);
    }
    .stash-item-actions button {
      flex: 1;
      padding: 6px 0;
      border: none;
      background: none;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .stash-item-actions button:hover {
      background: #f1f5f9;
      color: var(--text);
    }
    .stash-item-actions button.stash-delete:hover {
      background: #fef2f2;
      color: var(--danger);
    }
    .stash-empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--faint);
      font-size: 13px;
      padding: 18px 0;
    }

    #canvas {
      background: #ffffff;
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      box-shadow: 0 6px 20px rgba(17,24,39,0.12);
    }

    .canvas-element {
      position: absolute;
      cursor: move;
      user-select: none;
    }
    .canvas-element:hover {
      outline: 2px dashed var(--accent);
      outline-offset: 1px;
    }
    .canvas-element.selected {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }
    #canvas.capturing .resize-handle {
      display: none !important;
    }
    .canvas-element img {
      display: block;
      max-width: none;
    }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      color: var(--muted);
      font-size: 14px;
      gap: 10px;
    }
    .empty-state .icon { font-size: 40px; opacity: 0.35; color: var(--accent); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d3d7e0; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #b6bcc9; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(22,24,29,0.92);
      color: #fff;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 13px;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 9999;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Canvas bg options */
    .canvas-bg-option {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      color: var(--muted);
    }
    .canvas-bg-option input[type="color"] {
      -webkit-appearance: none; appearance: none;
      width: 32px; height: 30px; border: 1px solid var(--border); border-radius: 7px; padding: 0; cursor: pointer; background: none;
    }
    .canvas-bg-option input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
    .canvas-bg-option input[type="color"]::-webkit-color-swatch { border: none; border-radius: 5px; }

    /* Responsive: stack on narrow screens */
    @media (max-width: 960px) {
      .app-layout { flex-direction: column; min-height: 0; }
      .left-panel { width: 100%; max-width: none; position: static; max-height: none; top: auto; }
      .panel-resizer { display: none; }
      .right-panel { width: 100%; }
      .stash-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 520px) {
      .topbar { padding: 14px 16px; gap: 12px; }
      .app-layout { padding: 16px 14px 28px; }
      .stash-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<header class="topbar">
  <a class="back" href="../">← 猫凳系统</a>
  <div class="title-wrap">
    <h1>猫凳题目图片生成工具</h1>
    <p>题目一键生成图片</p>
  </div>
</header>

<div class="app-layout">
  <!-- Left Panel: Editor Controls -->
  <div class="left-panel">
    <div class="panel-toolbar">
      <button class="btn btn-primary" onclick="addText()">+ 文本</button>
      <button class="btn btn-primary" onclick="addImage()">+ 图片</button>
      <div style="flex:1"></div>
      <button class="btn btn-sm btn-danger" onclick="clearAll()">清空全部</button>
    </div>
    <div class="element-list" id="elementList">
      <div class="empty-state" id="emptyState">
        <div class="icon">+</div>
        <span>点击上方按钮添加元素</span>
      </div>
    </div>
  </div>

  <!-- Resizer -->
  <div class="panel-resizer" id="panelResizer"></div>

  <!-- Right Panel: Preview -->
  <div class="right-panel">
    <div class="save-bar">
      <div class="canvas-width-control">
        <label>高度:</label>
        <input type="number" id="canvasHeightInput" value="" min="100" max="5000" step="10" placeholder="自适应" onchange="updateCanvasHeight()">
        <span>px</span>
      </div>
      <button class="btn btn-sm" onclick="autoFitHeight()" title="根据内容自动调整高度">自适应高度</button>
      <span class="header-hint">固定 1000px 宽 · 纯白背景</span>
      <button class="btn btn-sm" onclick="stashCanvas()" title="暂存当前画布到剪贴板">暂存</button>
      <button class="btn btn-primary" onclick="saveToImage()">
        保存到本地
      </button>
    </div>
    <div class="preview-wrapper">
      <div id="canvas" style="width:1000px; min-height:500px;"></div>
    </div>
    <div class="stash-section">
      <div class="stash-section-header">
        <span>剪贴板</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <span id="stashCount" style="font-weight:normal;color:var(--text-secondary);font-size:12px;"></span>
          <button class="btn btn-sm btn-primary" id="downloadAllBtn" onclick="downloadAllStash()" style="display:none;">打包下载</button>
          <button class="btn btn-sm btn-danger" id="clearStashBtn" onclick="clearStash()" style="display:none;">清空</button>
        </div>
      </div>
      <div class="stash-grid" id="stashGrid">
        <div class="stash-empty" id="stashEmpty">点击「暂存」保存当前画布快照</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Hidden file input -->
<input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)">

<script>
let elements = [];
let selectedId = null;
let nextId = 1;
let dragState = null;
let pendingImageCallback = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// --- Element CRUD ---

function addText() {
  const el = {
    id: nextId++,
    type: 'text',
    text: '请输入文本内容',
    x: 5,
    y: 5 + elements.filter(e => e.type === 'text').length * 40,
    fontSize: 28,
    color: '#333333',
    bold: false,
    fontFamily: 'cuyuan',
    expanded: true
  };
  elements.push(el);
  renderList();
  renderCanvas();
}

function addImage() {
  const el = {
    id: nextId++,
    type: 'image',
    src: null,
    x: 5,
    y: 50 + elements.filter(e => e.type === 'image').length * 60,
    originalWidth: 300,
    originalHeight: 200,
    scale: 50,
    width: 150,
    height: 100,
    expanded: true
  };
  elements.push(el);
  selectedId = el.id;
  renderList();
  renderCanvas();
}

function uploadImageFor(id) {
  pendingImageCallback = id;
  document.getElementById('fileInput').click();
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  const targetId = pendingImageCallback;
  if (targetId == null) { e.target.value = ''; return; }
  const reader = new FileReader();
  reader.onload = function(ev) {
    const img = new Image();
    img.onload = function() {
      const el = elements.find(e => e.id === targetId);
      if (el) {
        el.src = ev.target.result;
        el.originalWidth = img.naturalWidth;
        el.originalHeight = img.naturalHeight;
        el.scale = 50;
        el.width = Math.round(img.naturalWidth * 50 / 100);
        el.height = Math.round(img.naturalHeight * 50 / 100);
      }
      pendingImageCallback = null;
      renderList();
      autoFitHeight();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function removeElement(id) {
  elements = elements.filter(e => e.id !== id);
  if (selectedId === id) selectedId = null;
  renderList();
  renderCanvas();
}

function moveElement(id, dir) {
  const idx = elements.findIndex(e => e.id === id);
  if (idx < 0) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= elements.length) return;
  [elements[idx], elements[newIdx]] = [elements[newIdx], elements[idx]];
  renderList();
  renderCanvas();
}

function duplicateElement(id) {
  const src = elements.find(e => e.id === id);
  if (!src) return;
  const el = { ...src, id: nextId++, x: src.x + 20, y: src.y + 20, expanded: true };
  elements.push(el);
  renderList();
  renderCanvas();
}

function clearAll() {
  if (elements.length === 0) return;
  elements = [];
  selectedId = null;
  renderList();
  renderCanvas();
  showToast('已清空所有元素');
}

// --- Toggle expand ---

function toggleExpand(id) {
  const el = elements.find(e => e.id === id);
  if (el) el.expanded = !el.expanded;
  renderList();
}

// --- Update element property ---

function updateProp(id, prop, value) {
  const el = elements.find(e => e.id === id);
  if (!el) return;
  if (prop === 'fontSize' || prop === 'x' || prop === 'y') {
    value = parseInt(value) || 0;
  }
  el[prop] = value;
  renderCanvas();
}

function updateColor(id, value) {
  const el = elements.find(e => e.id === id);
  if (!el) return;
  if (/^#[0-9a-fA-F]{6}$/.test(value)) {
    el.color = value;
    const colorPicker = document.getElementById('colorPicker_' + id);
    if (colorPicker) colorPicker.value = value;
    renderCanvas();
  }
}

function updateColorFromPicker(id, value) {
  const el = elements.find(e => e.id === id);
  if (!el) return;
  el.color = value;
  const colorText = document.getElementById('colorText_' + id);
  if (colorText) colorText.value = value;
  renderCanvas();
}

function createEmptyState() {

  return div;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Render canvas ---

function renderCanvas() {
  const canvas = document.getElementById('canvas');
  let html = '';

  let maxBottom = 100;
  elements.forEach(el => {
    if (el.type === 'text') {
      const fontFamilyMap = {
        'zhunyuan': "'ZhunYuan-Consolas', 'FZY3JW--GB1-0', '方正准圆简体', Consolas, 'PingFang SC', sans-serif",
        'cuyuan': "'CuYuan-Consolas', 'FZY4JW--GB1-0', '方正粗圆简体', Consolas, 'PingFang SC', sans-serif",
        'zhunyuan_only': "'FZY3JW--GB1-0', '方正准圆简体', 'PingFang SC', sans-serif",
        'consolas': "Consolas, 'Courier New', monospace",
        'songti': "'SimSun', '宋体', serif",
        'heiti': "'SimHei', '黑体', sans-serif",
        'kaiti': "'KaiTi', '楷体', serif",
        'pingfang': "'PingFang SC', 'Microsoft YaHei', sans-serif"
      };
      const ff = fontFamilyMap[el.fontFamily] || fontFamilyMap['zhunyuan'];
      const style = `
        left:${el.x}px;
        top:${el.y}px;
        font-size:${el.fontSize}px;
        color:${el.color};
        font-weight:${el.bold ? 'bold' : 'normal'};
        white-space:pre-wrap;
        line-height:1.5;
        font-family:${ff};
      `;
      const estimatedHeight = el.text.split('\n').length * el.fontSize * 1.5;
      const estimatedWidth = el.text.length * el.fontSize * 0.7;
      const bottom = el.y + estimatedHeight;
      if (bottom > maxBottom) maxBottom = bottom;
      const right = el.x + estimatedWidth;
      if (right > 1000) maxBottom += 30;
      html += `<div class="canvas-element${selectedId === el.id ? ' selected' : ''}" data-id="${el.id}" style="${style}">${escHtml(el.text)}</div>`;
    } else {
      const w = el.width || 300;
      const h = el.height || 200;
      const bottom = el.y + h;
      if (bottom > maxBottom) maxBottom = bottom;
      if (el.src) {
        html += `<div class="canvas-element${selectedId === el.id ? ' selected' : ''}" data-id="${el.id}" style="left:${el.x}px;top:${el.y}px;width:${w}px;height:${h}px;"><img src="${el.src}" style="width:100%;height:100%;display:block;"><div class="resize-handle" data-resize-id="${el.id}" style="position:absolute;right:0;bottom:0;width:16px;height:16px;cursor:nwse-resize;background:linear-gradient(135deg,transparent 50%,var(--primary) 50%);opacity:0.6;border-radius:0 0 0 2px;"></div></div>`;
      } else {
        html += `<div class="canvas-element${selectedId === el.id ? ' selected' : ''}" data-id="${el.id}" data-placeholder="true" style="left:${el.x}px;top:${el.y}px;width:${w}px;height:${h}px;border:2px dashed #94a3b8;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;background:rgba(148,163,184,0.06);"><span style="font-size:32px;color:#94a3b8;pointer-events:none;">+</span><span style="font-size:13px;color:#94a3b8;pointer-events:none;">点击左侧上传图片</span><span style="font-size:11px;color:#b0bec5;pointer-events:none;">${w} × ${h}</span></div>`;
      }
    }
  });

  canvas.innerHTML = html;

  // Height logic
  const fixedH = parseInt(document.getElementById('canvasHeightInput').value);
  if (fixedH && fixedH > 0) {
    canvas.style.minHeight = '';
    canvas.style.height = fixedH + 'px';
  } else {
    canvas.style.height = '';
    // Use actual DOM measurement for accurate text height
    let actualMaxBottom = 0;
    canvas.querySelectorAll('.canvas-element').forEach(domEl => {
      const id = parseInt(domEl.dataset.id);
      const srcEl = elements.find(e => e.id === id);
      if (srcEl && srcEl.type === 'text') {
        const b = srcEl.y + domEl.offsetHeight;
        if (b > actualMaxBottom) actualMaxBottom = b;
      }
    });
    canvas.style.minHeight = Math.max(10, actualMaxBottom + 5) + 'px';
  }
}

// --- Image scale ---

function updateImageScale(id, val) {
  const el = elements.find(e => e.id === id);
  if (!el || el.type !== 'image') return;
  let s = parseFloat(val);
  if (isNaN(s) || s <= 0) s = 100;
  el.scale = s;
  el.width = Math.round(el.originalWidth * s / 100);
  el.height = Math.round(el.originalHeight * s / 100);
  renderList();
  renderCanvas();
}

function updateCanvasHeight() {
  renderCanvas();
}

function autoFitHeight() {
  // First render without fixed height to measure content
  const heightInput = document.getElementById('canvasHeightInput');
  heightInput.value = '';
  renderCanvas();

  // Measure actual content bottom
  const canvas = document.getElementById('canvas');
  let actualMax = 0;
  canvas.querySelectorAll('.canvas-element').forEach(domEl => {
    const id = parseInt(domEl.dataset.id);
    const srcEl = elements.find(e => e.id === id);
    if (!srcEl) return;
    const b = srcEl.y + domEl.offsetHeight;
    if (b > actualMax) actualMax = b;
  });

  const fittedH = Math.max(10, Math.ceil(actualMax + 5));
  heightInput.value = fittedH;
  renderCanvas();
  showToast('高度已自动调整为 ' + fittedH + 'px');
}

// --- Stash (clipboard) ---

let stashItems = [];
let stashNextId = 1;

// 保证导出为不透明纯白底：把截图重绘到预先填白的画布上（杜绝任何透明 → 看图器显示为灰）
function flattenWhite(srcCanvas) {
  const out = document.createElement('canvas');
  out.width = srcCanvas.width;
  out.height = srcCanvas.height;
  const ctx = out.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, out.width, out.height);
  ctx.drawImage(srcCanvas, 0, 0);
  return out;
}

async function stashCanvas() {
  const prevSelected = selectedId;
  selectedId = null;
  renderCanvas();

  const canvas = document.getElementById('canvas');
  canvas.classList.add('capturing');
  try {
    const c = await html2canvas(canvas, {
      scale: 1,
      useCORS: true,
      backgroundColor: '#ffffff',
      width: 1000,
      height: canvas.scrollHeight
    });
    canvas.classList.remove('capturing');
    stashItems.push({
      id: stashNextId++,
      dataUrl: flattenWhite(c).toDataURL('image/png'),
      time: new Date().toLocaleTimeString()
    });
    renderStash();
    showToast('已暂存到剪贴板');
  } catch (err) {
    canvas.classList.remove('capturing');
    console.error(err);
    showToast('暂存失败');
  }

  selectedId = prevSelected;
  renderCanvas();
}

function renderStash() {
  const grid = document.getElementById('stashGrid');
  const count = document.getElementById('stashCount');
  const downloadAllBtn = document.getElementById('downloadAllBtn');
  const clearStashBtn = document.getElementById('clearStashBtn');
  if (stashItems.length === 0) {
    grid.innerHTML = '<div class="stash-empty">点击「暂存」保存当前画布快照</div>';
    count.textContent = '';
    downloadAllBtn.style.display = 'none';
    clearStashBtn.style.display = 'none';
    return;
  }
  count.textContent = stashItems.length + ' 项';
  downloadAllBtn.style.display = '';
  clearStashBtn.style.display = '';
  let html = '';
  stashItems.forEach((item, idx) => {
    const seq = idx + 1;
    html += `<div class="stash-item">
      <img src="${item.dataUrl}" title="${item.time} → ${seq}.png" onclick="downloadStash(${item.id})">
      <div class="stash-item-actions">
        <span class="stash-item-num">${seq}.png</span>
        <button onclick="downloadStash(${item.id})" title="下载 ${seq}.png">下载</button>
        <button class="stash-delete" onclick="removeStash(${item.id})" title="删除">删除</button>
      </div>
    </div>`;
  });
  grid.innerHTML = html;
}

function downloadStash(id) {
  const idx = stashItems.findIndex(s => s.id === id);
  if (idx < 0) return;
  const link = document.createElement('a');
  link.download = `${idx + 1}.png`;
  link.href = stashItems[idx].dataUrl;
  link.click();
}

function removeStash(id) {
  stashItems = stashItems.filter(s => s.id !== id);
  renderStash();
}

function clearStash() {
  if (stashItems.length === 0) return;
  if (!confirm(`确定清空暂存区的 ${stashItems.length} 张图片吗？`)) return;
  stashItems = [];
  renderStash();
  showToast('已清空暂存区');
}

// --- One-click package download (ZIP, store/no-compression) ---

const CRC_TABLE = (() => {
  const table = new Uint32Array(256);
  for (let n = 0; n < 256; n++) {
    let c = n;
    for (let k = 0; k < 8; k++) {
      c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    }
    table[n] = c >>> 0;
  }
  return table;
})();

function crc32(bytes) {
  let crc = -1;
  for (let i = 0; i < bytes.length; i++) {
    crc = (crc >>> 8) ^ CRC_TABLE[(crc ^ bytes[i]) & 0xFF];
  }
  return (crc ^ -1) >>> 0;
}

function dataUrlToBytes(dataUrl) {
  const binary = atob(dataUrl.split(',')[1]);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

// Build a valid .zip Blob from [{name, data:Uint8Array}] using the store method.
function buildZip(files) {
  const encoder = new TextEncoder();
  const chunks = [];
  const central = [];
  let offset = 0;

  files.forEach(file => {
    const nameBytes = encoder.encode(file.name);
    const data = file.data;
    const crc = crc32(data);
    const size = data.length;

    const header = new DataView(new ArrayBuffer(30));
    header.setUint32(0, 0x04034b50, true);   // local file header signature
    header.setUint16(4, 20, true);            // version needed
    header.setUint16(6, 0, true);             // flags
    header.setUint16(8, 0, true);             // compression: store
    header.setUint16(10, 0, true);            // mod time
    header.setUint16(12, 0, true);            // mod date
    header.setUint32(14, crc, true);          // crc32
    header.setUint32(18, size, true);         // compressed size
    header.setUint32(22, size, true);         // uncompressed size
    header.setUint16(26, nameBytes.length, true); // name length
    header.setUint16(28, 0, true);            // extra length
    chunks.push(new Uint8Array(header.buffer), nameBytes, data);

    const cd = new DataView(new ArrayBuffer(46));
    cd.setUint32(0, 0x02014b50, true);        // central dir signature
    cd.setUint16(4, 20, true);                // version made by
    cd.setUint16(6, 20, true);                // version needed
    cd.setUint16(8, 0, true);                 // flags
    cd.setUint16(10, 0, true);                // compression: store
    cd.setUint16(12, 0, true);                // mod time
    cd.setUint16(14, 0, true);                // mod date
    cd.setUint32(16, crc, true);              // crc32
    cd.setUint32(20, size, true);             // compressed size
    cd.setUint32(24, size, true);             // uncompressed size
    cd.setUint16(28, nameBytes.length, true); // name length
    cd.setUint16(30, 0, true);                // extra length
    cd.setUint16(32, 0, true);                // comment length
    cd.setUint16(34, 0, true);                // disk number
    cd.setUint16(36, 0, true);                // internal attrs
    cd.setUint32(38, 0, true);                // external attrs
    cd.setUint32(42, offset, true);           // local header offset
    central.push({ header: new Uint8Array(cd.buffer), name: nameBytes });

    offset += 30 + nameBytes.length + size;
  });

  const centralStart = offset;
  let centralSize = 0;
  central.forEach(c => {
    chunks.push(c.header, c.name);
    centralSize += c.header.length + c.name.length;
  });

  const eocd = new DataView(new ArrayBuffer(22));
  eocd.setUint32(0, 0x06054b50, true);        // end of central dir signature
  eocd.setUint16(4, 0, true);                 // disk number
  eocd.setUint16(6, 0, true);                 // disk with central dir
  eocd.setUint16(8, files.length, true);      // entries on this disk
  eocd.setUint16(10, files.length, true);     // total entries
  eocd.setUint32(12, centralSize, true);      // central dir size
  eocd.setUint32(16, centralStart, true);     // central dir offset
  eocd.setUint16(20, 0, true);                // comment length
  chunks.push(new Uint8Array(eocd.buffer));

  return new Blob(chunks, { type: 'application/zip' });
}

function downloadAllStash() {
  if (stashItems.length === 0) {
    showToast('暂存区为空');
    return;
  }
  try {
    const files = stashItems.map((item, idx) => ({
      name: `${idx + 1}.png`,
      data: dataUrlToBytes(item.dataUrl)
    }));
    const blob = buildZip(files);
    const link = document.createElement('a');
    link.download = `morton_images_${Date.now()}.zip`;
    link.href = URL.createObjectURL(blob);
    link.click();
    setTimeout(() => URL.revokeObjectURL(link.href), 2000);
    showToast(`已打包下载 ${files.length} 张图片`);
  } catch (err) {
    console.error(err);
    showToast('打包失败，请重试');
  }
}

  renderCanvas();

  const canvas = document.getElementById('canvas');
  canvas.classList.add('capturing');

  try {
    const c = await html2canvas(canvas, {
      scale: 1,
      useCORS: true,
      backgroundColor: '#ffffff',
      width: 1000,
      height: canvas.scrollHeight
    });
    canvas.classList.remove('capturing');

    const link = document.createElement('a');
    link.download = `morton_${Date.now()}.png`;
    link.href = flattenWhite(c).toDataURL('image/png');
    link.click();
    showToast('图片已保存');
  } catch (err) {
    canvas.classList.remove('capturing');
    console.error(err);
    showToast('保存失败，请重试');
  }
}

// --- Drag support on canvas ---

document.addEventListener('DOMContentLoaded', () => {
  const canvasEl = document.getElementById('canvas');

  // --- Left panel resizer ---
  const resizer = document.getElementById('panelResizer');
  const leftPanel = document.querySelector('.left-panel');
  let resizeState = null;

  resizer.addEventListener('mousedown', (e) => {
    resizeState = { startX: e.clientX, startW: leftPanel.offsetWidth };
    resizer.classList.add('active');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!resizeState) {
      // existing drag logic below
    }
  });

  document.addEventListener('mousemove', function handleResize(e) {
    if (resizeState) {
      const dx = e.clientX - resizeState.startX;
      const newW = Math.max(240, Math.min(600, resizeState.startW + dx));
      leftPanel.style.width = newW + 'px';
      e.preventDefault();
      return;
    }
  }, true); // capture phase so it runs before canvas drag

  document.addEventListener('mouseup', function handleResizeUp() {
    if (resizeState) {
      resizeState = null;
      resizer.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
    }
  }, true);

  // --- Canvas element drag ---
  canvasEl.addEventListener('mousedown', (e) => {
    // Check resize handle first
    const resizeHandle = e.target.closest('.resize-handle');
    if (resizeHandle) {
      const id = parseInt(resizeHandle.dataset.resizeId);
      const srcEl = elements.find(e => e.id === id);
      if (!srcEl || srcEl.type !== 'image' || !srcEl.src) return;
      selectedId = id;
      renderCanvas();
      const scaleRatio = canvasEl.offsetWidth / parseInt(canvasEl.style.width);
      dragState = {
        id,
        startX: e.clientX,
        startY: e.clientY,
        scaleRatio,
        resizing: true,
        origScale: srcEl.scale
      };
      e.preventDefault();
      e.stopPropagation();
      return;
    }

    const el = e.target.closest('.canvas-element');
    if (!el) return;
    const id = parseInt(el.dataset.id);
    selectedId = id;
    renderCanvas();

    const rect = canvasEl.getBoundingClientRect();
    const scaleRatio = canvasEl.offsetWidth / parseInt(canvasEl.style.width);

    dragState = {
      id,
      startX: e.clientX,
      startY: e.clientY,
      origX: e.clientX,
      origY: e.clientY,
      scaleRatio
    };
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragState) return;
    const el = elements.find(e => e.id === dragState.id);
    if (!el) return;

    if (dragState.resizing && el.type === 'image') {
      // Proportional resize based on horizontal drag
      const dx = (e.clientX - dragState.startX) / dragState.scaleRatio;
      const deltaPercent = (dx / el.originalWidth) * 100;
      const newScale = Math.max(5, Math.min(500, Math.round(dragState.origScale + deltaPercent)));
      el.scale = newScale;
      el.width = Math.round(el.originalWidth * newScale / 100);
      el.height = Math.round(el.originalHeight * newScale / 100);
      // Direct DOM update
      const domEl = canvasEl.querySelector(`[data-id="${dragState.id}"]`);
      if (domEl) {
        domEl.style.width = el.width + 'px';
        domEl.style.height = el.height + 'px';
      }
      e.preventDefault();
      return;
    }

    const dx = (e.clientX - dragState.startX) / dragState.scaleRatio;
    const dy = (e.clientY - dragState.startY) / dragState.scaleRatio;

    el.x = Math.round(el.x + dx);
    el.y = Math.round(el.y + dy);

    dragState.startX = e.clientX;
    dragState.startY = e.clientY;

    // Direct DOM update for performance (avoid full re-render)
    const domEl = canvasEl.querySelector(`[data-id="${dragState.id}"]`);
    if (domEl) {
      domEl.style.left = el.x + 'px';
      domEl.style.top = el.y + 'px';
    }
    e.preventDefault();
  });

  document.addEventListener('mouseup', () => {
    if (dragState) {
      renderList(); // sync panel values
      renderCanvas(); // ensure canvas height is correct
      dragState = null;
    }
  });

  // Touch support
  canvasEl.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    const canvasElChild = el && el.closest('.canvas-element');
    if (!canvasElChild) return;
    const id = parseInt(canvasElChild.dataset.id);
    selectedId = id;
    renderCanvas();

    const scaleRatio = canvasEl.offsetWidth / parseInt(canvasEl.style.width);
    dragState = { id, startX: touch.clientX, startY: touch.clientY, scaleRatio };
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchmove', (e) => {
    if (!dragState) return;
    const touch = e.touches[0];
    const el = elements.find(e => e.id === dragState.id);
    if (!el) return;

    const dx = (touch.clientX - dragState.startX) / dragState.scaleRatio;
    const dy = (touch.clientY - dragState.startY) / dragState.scaleRatio;
    el.x = Math.round(el.x + dx);
    el.y = Math.round(el.y + dy);
    dragState.startX = touch.clientX;
    dragState.startY = touch.clientY;

    const domEl = canvasEl.querySelector(`[data-id="${dragState.id}"]`);
    if (domEl) {
      domEl.style.left = el.x + 'px';
      domEl.style.top = el.y + 'px';
    }
    e.preventDefault();
  }, { passive: false });

  document.addEventListener('touchend', () => {
    if (dragState) {
      renderList();
      renderCanvas();
      dragState = null;
    }
  });
});
</script>
